<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yearly Discoveries</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            spotify: {
              green: '#1DB954',
              black: '#121212',
              panel: '#181818',
              panelHover: '#282828',
              muted: '#b3b3b3'
            }
          },
          boxShadow: {
            glow: '0 20px 60px rgba(29, 185, 84, 0.16)'
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-spotify-black text-white antialiased">

<div class="absolute inset-x-0 top-0 -z-10 h-80 bg-[radial-gradient(circle_at_top,rgba(29,185,84,0.18),transparent_45%),linear-gradient(180deg,#1a1a2e_0%,#121212_72%)]"></div>

<header class="px-6 pb-8 pt-10 text-center sm:px-8">
  <div class="mx-auto max-w-4xl rounded-[2rem] border border-white/10 bg-white/5 px-6 py-8 shadow-glow backdrop-blur">
    <a href="/logout" class="absolute right-4 top-4 rounded-full border border-white/20 px-4 py-1.5 text-xs font-medium text-spotify-muted transition hover:border-white/40 hover:text-white">Logout</a>
    <p class="text-xs font-semibold uppercase tracking-[0.35em] text-spotify-green/75">Spotify Explorer</p>
    <h1 class="mt-4 text-4xl font-black tracking-tight text-spotify-green sm:text-5xl">🎵 Yearly Discoveries</h1>
    <p class="mx-auto mt-3 max-w-2xl text-sm leading-6 text-spotify-muted sm:text-base">Songs you added to your playlists that were released in a specific year</p>
  </div>
</header>

<div class="sticky top-0 z-10 border-y border-white/10 bg-black/35 backdrop-blur-xl">
  <div id="yearBar" class="mx-auto flex max-w-6xl flex-wrap justify-center gap-3 px-4 py-5 sm:px-6"></div>
</div>

<main class="mx-auto max-w-5xl px-4 py-10 sm:px-6">
  <div id="statusArea" class="rounded-[1.5rem] border border-dashed border-white/10 bg-white/[0.03] px-6 py-20 text-center text-base leading-7 text-spotify-muted">Select a year above to browse your discoveries.</div>
  <div id="resultsHeader" class="mb-5 hidden items-center justify-between gap-4">
    <div class="text-sm text-spotify-muted sm:text-base">
      Found <strong id="resultCount" class="font-semibold text-white"></strong> songs released in <strong id="resultYear" class="font-semibold text-white"></strong>
    </div>
  </div>
  <div id="trackList" class="flex flex-col gap-2"></div>
</main>

<script>
  const yearBar       = document.getElementById('yearBar');
  const statusArea    = document.getElementById('statusArea');
  const resultsHeader = document.getElementById('resultsHeader');
  const resultCount   = document.getElementById('resultCount');
  const resultYear    = document.getElementById('resultYear');
  const trackList     = document.getElementById('trackList');

  let activeBtn = null;

  const yearBtnBaseClasses = [
    'rounded-full',
    'border',
    'border-white/5',
    'bg-white/10',
    'px-5',
    'py-2',
    'text-sm',
    'font-semibold',
    'text-white',
    'transition',
    'duration-150',
    'hover:bg-white/15',
    'active:scale-[0.98]'
  ];
  const yearBtnActiveClasses = [
    'border-spotify-green/50',
    'bg-spotify-green',
    'text-black',
    'shadow-lg',
    'shadow-spotify-green/20'
  ];

  function setStatus(message, loading = false) {
    statusArea.className = loading
      ? 'flex items-center justify-center gap-3 rounded-[1.5rem] border border-white/10 bg-white/[0.03] px-6 py-20 text-center text-base leading-7 text-spotify-muted'
      : 'rounded-[1.5rem] border border-dashed border-white/10 bg-white/[0.03] px-6 py-20 text-center text-base leading-7 text-spotify-muted';

    statusArea.innerHTML = loading
      ? `<div class="h-6 w-6 animate-spin rounded-full border-[3px] border-spotify-green border-t-transparent"></div><span>${esc(message)}</span>`
      : esc(message);
    statusArea.style.display = 'block';
  }

  // Fetch year range from server so the UI stays in sync with backend config.
  fetch('/api/config')
    .then(r => r.json())
    .then(cfg => buildYearButtons(cfg.startYear, cfg.endYear))
    .catch(() => buildYearButtons(2015, new Date().getFullYear()));

  function buildYearButtons(startYear, endYear) {
    for (let y = endYear; y >= startYear; y--) {
      const btn = document.createElement('button');
      btn.className    = yearBtnBaseClasses.join(' ');
      btn.textContent  = y;
      btn.dataset.year = y;
      btn.addEventListener('click', () => loadYear(y, btn));
      yearBar.appendChild(btn);
    }
  }

  async function loadYear(year, btn) {
    if (activeBtn) {
      activeBtn.classList.remove(...yearBtnActiveClasses);
    }
    activeBtn = btn;
    btn.classList.add(...yearBtnActiveClasses);

    setStatus(`Loading songs for ${year}…`, true);
    resultsHeader.classList.add('hidden');
    resultsHeader.classList.remove('flex');
    trackList.innerHTML   = '';

    try {
      const res   = await fetch('/api/songs?year=' + year);
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const songs = await res.json();

      statusArea.style.display = 'none';

      if (!songs || songs.length === 0) {
        setStatus(`No discoveries found for ${year}. Make sure you have playlists with "${year}" in their name.`);
        return;
      }

      resultCount.textContent = songs.length;
      resultYear.textContent  = year;
      resultsHeader.classList.remove('hidden');
      resultsHeader.classList.add('flex');
      renderTracks(songs);
    } catch (err) {
      setStatus('Error: ' + err.message);
    }
  }

  function fmtDuration(ms) {
    const s   = Math.floor(ms / 1000);
    const m   = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
  }

  function safeSpotifyUrl(url) {
    // Only allow https:// URLs to prevent javascript: or data: injection.
    if (typeof url === 'string' && url.startsWith('https://')) {
      return url;
    }
    return '';
  }

  function renderTracks(songs) {
    trackList.innerHTML = songs.map((song, i) => {
      const spotifyUrl = safeSpotifyUrl(song.spotifyUrl);
      return `
      <div class="grid grid-cols-[1.5rem_44px_minmax(0,1fr)_auto] items-center gap-3 rounded-2xl border border-white/5 bg-spotify-panel/90 px-3 py-3 text-left transition duration-150 hover:border-white/10 hover:bg-spotify-panelHover sm:grid-cols-[2rem_52px_minmax(0,1fr)_auto] sm:gap-4 sm:px-4">
        <div class="text-right text-xs tabular-nums text-white/30 sm:text-sm">${i + 1}</div>
        ${song.albumArtUrl
          ? `<img class="h-11 w-11 rounded-xl bg-white/10 object-cover sm:h-14 sm:w-14" src="${esc(song.albumArtUrl)}" alt="" loading="lazy">`
          : `<div class="flex h-11 w-11 items-center justify-center rounded-xl bg-white/10 text-lg text-white/30 sm:h-14 sm:w-14">♪</div>`}
        <div class="min-w-0">
          <div class="truncate text-sm font-semibold text-white sm:text-[0.95rem]">${esc(song.name)}</div>
          <div class="mt-0.5 truncate text-xs text-spotify-muted sm:text-[0.8rem]">${esc(song.artists.join(', '))} · ${esc(song.album)}</div>
        </div>
        <div class="flex min-w-0 flex-col items-end gap-1 text-right">
          <span class="whitespace-nowrap text-xs tabular-nums text-spotify-muted sm:text-[0.82rem]">${fmtDuration(song.durationMs)}</span>
          <span class="hidden max-w-40 truncate text-[0.72rem] text-white/35 sm:inline">📋 ${esc(song.playlist)}</span>
          ${spotifyUrl
            ? `<a class="inline-flex items-center gap-1 whitespace-nowrap rounded-full border border-spotify-green/20 bg-spotify-green/10 px-3 py-1 text-[0.78rem] font-medium text-spotify-green transition hover:bg-spotify-green/15" href="${esc(spotifyUrl)}" target="_blank" rel="noopener"><span class="text-[0.7rem]">▶</span> Open</a>`
            : ''}
        </div>
      </div>
    `}).join('');
  }
</script>
</body>
</html>
